name: Stock News Telegram

on:
  schedule:
    - cron: '0 0 * * 1-5'
    - cron: '30 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '30 2 * * 1-5'
    - cron: '0 3 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '0 4 * * 1-5'
    - cron: '30 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '30 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: install
        run: pip install requests feedparser
      - name: run
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_telegram.py
